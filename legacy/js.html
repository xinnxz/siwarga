<script>
  // ============================================================
  // STATE GLOBAL
  // ============================================================
  var user = null;
  var isAdmin = false;
  var NOMOR_WA_KETUA = "6283818440128"; // Ganti dengan nomor ketua RT

  // State editing per modul
  var editRow = { Warga:0, Yatim:0, UMKM:0, Tamu:0, Pengumuman:0, Kas:0, Info:0, Ronda:0 };

  // ============================================================
  // LOGIN & SESSION
  // ============================================================
  window.onload = function() {
    var saved = localStorage.getItem('rt05_session');
    if (saved) {
      try { user = JSON.parse(saved); tampilApp(); }
      catch(e) { localStorage.removeItem('rt05_session'); }
    }
  };

  function prosesLogin() {
    var u = document.getElementById('inputUser').value.trim();
    var p = document.getElementById('inputPass').value.trim();
    if (!u || !p) { tampilLoginError("Isi username dan password!"); return; }
    document.getElementById('loginError').style.display = 'none';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          user = res;
          localStorage.setItem('rt05_session', JSON.stringify(res));
          tampilApp();
        } else { tampilLoginError("Username atau Password salah!"); }
      })
      .withFailureHandler(function() { tampilLoginError("Gagal terhubung. Coba lagi."); })
      .checkLogin(u, p);
  }

  function tampilLoginError(msg) {
    var el = document.getElementById('loginError');
    el.innerText = msg; el.style.display = 'block';
  }

  function tampilApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('uNama').innerText = user.nama;
    document.getElementById('uPeran').innerText = user.peran;
    if (user.noRumah && user.noRumah !== '' && user.noRumah !== '-') {
      var badgeEl = document.getElementById('uNoRumah');
      badgeEl.innerText = 'No Rumah. ' + user.noRumah;
      badgeEl.style.display = 'inline-block';
    }
    isAdmin = user.peran && (user.peran.includes("Ketua") || user.peran.includes("Pengurus"));
    var adminForms = ['formWarga','formKontrakan','formYatim','formKas','formUMKM','formInfo'];
    adminForms.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = isAdmin ? 'block' : 'none';
    });
    if (isAdmin) {
      document.getElementById('btnTambahPengumuman').style.display = 'block';
      document.getElementById('formPengumuman').style.display = 'block';
      document.getElementById('rondaThAksi').style.display = '';
    }
    refreshSemua();
    terapkanPengaturan();
  }

  function logout() {
    if (confirm("Yakin ingin keluar?")) { localStorage.removeItem('rt05_session'); location.reload(); }
  }

  // ============================================================
  // REFRESH DATA
  // ============================================================
  function refreshSemua() {
    refreshPengumuman(); refreshLaporan(); refreshTamu(); refreshKas();
    refreshWarga(); refreshUMKM(); refreshYatim(); refreshKontrakan();
    refreshRonda(); refreshInfo();
  }

  function escStr(s) { return (s||'').toString().replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  function refreshPengumuman() {
    google.script.run
      .withSuccessHandler(function(d) {
        var el = document.getElementById('listPengumuman');
        if (!d || d.length === 0) {
          el.innerHTML = '<div class="empty-state">Belum ada pengumuman</div>';
          return;
        }
        var h = '';
        var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
        items.reverse().forEach(function(item) {
          var r = item.data; var rn = item.rowNum;
          var tgl = r[0] ? r[0].toString() : '';
          var isi = r[1] ? r[1].toString() : '';
          var nama = r[2] ? r[2].toString() : '';
          h += '<div class="pengumuman-item">'
            + '<div class="item-row"><div class="item-info">'
            + '<span class="p-nama">' + nama + '</span>'
            + '<span class="p-tgl">' + tgl + '</span>'
            + '<div class="p-isi">' + isi + '</div>'
            + '</div>'
            + (isAdmin ? '<div class="item-actions"><button class="btn-edit-sm" onclick="editPengumuman(' + rn + ',\'' + escStr(isi) + '\')">✏️</button><button class="btn-del-sm" onclick="hapusData(\'Pengumuman\',' + rn + ',refreshPengumuman)">🗑️</button></div>' : '')
            + '</div></div>';
        });
        el.innerHTML = h;
      })
      .withFailureHandler(function(e){
        document.getElementById('listPengumuman').innerHTML='<div style="color:red;padding:10px;font-size:12px;">Error: '+e.message+'</div>';
      })
      .fetchData('Pengumuman');
  }

  function refreshLaporan() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listLaporan');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada laporan</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        var st = (r[4]||'Proses').toString();
        var stClass = st==='Selesai'?'status-selesai':(st==='Ditolak'?'status-ditolak':'status-proses');
        h += '<div class="laporan-item"><b style="font-size:var(--fs-nm,3.8vw);color:#555;">' + (r[1]||'') + '</b> <small style="color:#999;font-size:3vw;">(' + (r[2]||'') + ')</small>'
          + '<div style="font-size:2.8vw;color:#aaa;margin-top:0.5vw;">' + (r[0]||'') + '</div>'
          + '<div style="font-size:3.2vw;margin-top:1vw;color:#333;line-height:1.5;">' + (r[3]||'') + '</div>'
          + '<div style="margin-top:6px;"><span class="badge-status ' + stClass + '">' + st + '</span>';
        if (isAdmin) {
          h += '<br><button class="btn-status" style="background:#e8f5e9;color:#2e7d32;" onclick="ubahStatusLaporan(' + rn + ',\'Selesai\')">✅ Selesai</button>'
            + '<button class="btn-status" style="background:#ffebee;color:#c62828;" onclick="ubahStatusLaporan(' + rn + ',\'Ditolak\')">❌ Tolak</button>'
            + '<button class="btn-status" style="background:#fff3e0;color:#e65100;" onclick="ubahStatusLaporan(' + rn + ',\'Proses\')">🔄 Proses</button>'
            + '<button class="btn-del-sm" onclick="hapusData(\'Laporan\',' + rn + ',refreshLaporan)" style="margin-top:4px;">🗑️ Hapus</button>';
        }
        h += '</div></div>';
      });
      el.innerHTML = h;
    }).withFailureHandler(function(e){ document.getElementById('listLaporan').innerHTML='<div style="color:red;padding:10px;">Error: '+e.message+'</div>'; })
    .fetchData('Laporan');
  }

  function refreshTamu() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listTamu');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada tamu</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        h += '<div class="card-custom" style="border-left:9px solid #4caf50;">'
          + '<div class="item-row"><div class="item-info"><b style="font-size:3.5vw;">' + (r[2]||'') + '</b>'
          + '<div style="font-size:2.8vw;color:#aaa;">' + (r[1]||'') + '</div>'
          + '<div style="font-size:3.5vw;color:#555;">Keperluan: ' + (r[4]||'') + '</div>'
          + '<div style="font-size:3vw;color:#aaa;">Pelapor: ' + (r[3]||'') + '</div></div>'
          + ((isAdmin || (r[3]||'').toString() === user.nama) ? '<div class="item-actions"><button class="btn-edit-sm" onclick="editTamu(' + rn + ',\'' + escStr(r[2]) + '\',\'' + escStr(r[4]) + '\')">✏️</button><button class="btn-del-sm" onclick="hapusData(\'BukuTamu\',' + rn + ',refreshTamu)">🗑️</button></div>' : '')
          + '</div></div>';
      });
      el.innerHTML = h;
    }).fetchData('BukuTamu');
  }

  function refreshKas() {
    google.script.run.withSuccessHandler(function(d) {
      var h = ''; var saldo = 0;
      if (!d || d.length === 0) { h = '<div class="empty-state">Belum ada transaksi</div>'; }
      else {
        saldo = d[d.length-1][3];
        var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
        items.reverse().forEach(function(item) {
          var r = item.data; var rn = item.rowNum;
          var ismasuk = Number(r[1]) > 0;
          h += '<div class="card-custom"><div class="item-row"><div class="item-info">'
            + '<div style="font-size:3.5vw;font-weight:500;">' + (r[4]||'') + '</div>'
            + '<div style="font-size:3.5vw;color:#aaa;margin-top:0.5vw;">' + (r[0]||'') + '</div></div>'
            + '<div style="display:flex;align-items:center;gap:6px;">'
            + '<b class="' + (ismasuk?'text-masuk':'text-keluar') + '">' + (ismasuk?'+':'-') + ' Rp ' + Number(ismasuk?r[1]:r[2]).toLocaleString('id') + '</b>'
            + (isAdmin ? '<button class="btn-del-sm" onclick="hapusData(\'UangKematian\',' + rn + ',refreshKas)">🗑️</button>' : '')
            + '</div></div></div>';
        });
      }
      document.getElementById('listKas').innerHTML = h;
      document.getElementById('saldo').innerText = 'Rp ' + Number(saldo).toLocaleString('id');
    }).fetchData('UangKematian');
  }

  function refreshWarga() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listWarga');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada data warga</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        h += '<div class="card-custom"><div class="item-row"><div class="item-info">'
          + '<b style="font-size:3.2vw;">' + (r[0]||'') + '</b>'
          + '<div style="font-size:3.5vw;color:#888;margin-top:1vw;">No. ' + (r[1]||'') + ' | ' + (r[2]||'') + ' | ' + (r[3]||'') + '</div></div>'
          + (isAdmin ? '<div class="item-actions"><button class="btn-edit-sm" onclick="editWarga(' + rn + ',\'' + escStr(r[0]) + '\',\'' + escStr(r[1]) + '\',\'' + escStr(r[2]) + '\',\'' + escStr(r[3]) + '\')">✏️</button><button class="btn-del-sm" onclick="hapusData(\'DataWarga\',' + rn + ',refreshWarga)">🗑️</button></div>' : '')
          + '</div></div>';
      });
      el.innerHTML = h;
    }).fetchData('DataWarga');
  }

  function refreshUMKM() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listUMKM');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada UMKM</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        h += '<div class="card-custom" style="border-left:4px solid #4caf50;"><div class="item-row"><div class="item-info">'
          + '<b style="font-size:3.5vw;">' + (r[0]||'') + '</b>'
          + '<div style="font-size:3vw;color:#777;margin-top:0.5vw;">Pemilik: ' + (r[1]||'') + ' (No. ' + (r[2]||'') + ')</div>'
          + '<div style="font-size:3vw;color:#555;">Ket: ' + (r[3]||'') + '</div></div>'
          + (isAdmin ? '<div class="item-actions"><button class="btn-edit-sm" onclick="editUMKM(' + rn + ',\'' + escStr(r[0]) + '\',\'' + escStr(r[1]) + '\',\'' + escStr(r[2]) + '\',\'' + escStr(r[3]) + '\')">✏️</button><button class="btn-del-sm" onclick="hapusData(\'UMKM\',' + rn + ',refreshUMKM)">🗑️</button></div>' : '')
          + '</div></div>';
      });
      el.innerHTML = h;
    }).fetchData('UMKM');
  }

  function refreshYatim() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listYatim');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada data yatim</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        h += '<div class="card-custom" style="border-left:4px solid #e53935;"><div class="item-row"><div class="item-info">'
          + '<b style="font-size:3.2vw;">' + (r[0]||'') + '</b>'
          + '<div style="font-size:3.5vw;color:#777;margin-top:0.5vw;">Umur: ' + (r[1]||'') + ' thn | No. Rumah: ' + (r[2]||'') + '</div></div>'
          + (isAdmin ? '<div class="item-actions"><button class="btn-edit-sm" onclick="editYatim(' + rn + ',\'' + escStr(r[0]) + '\',\'' + escStr(r[1]) + '\',\'' + escStr(r[2]) + '\')">✏️</button><button class="btn-del-sm" onclick="hapusData(\'DataYatim\',' + rn + ',refreshYatim)">🗑️</button></div>' : '')
          + '</div></div>';
      });
      el.innerHTML = h;
    }).fetchData('DataYatim');
  }

  function refreshKontrakan() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listKontrakan');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada data kontrakan</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        h += '<div class="card-custom"><div class="item-row"><div class="item-info" style="font-weight:600;">No. ' + (r[0]||'') + '</div>'
          + '<div style="display:flex;align-items:center;gap:8px;">'
          + '<span class="' + (r[1]==='Kosong'?'badge-kosong':'badge-isi') + '">' + (r[1]||'') + '</span>'
          + (isAdmin ? '<button class="btn-del-sm" onclick="hapusData(\'Kontrakan\',' + rn + ',refreshKontrakan)">🗑️</button>' : '')
          + '</div></div></div>';
      });
      el.innerHTML = h;
    }).fetchData('Kontrakan');
  }

  function refreshRonda() {
    google.script.run.withSuccessHandler(function(d) {
      var h = '';
      if (!d || d.length === 0) {
        h = '<tr><td colspan="3" class="text-center text-muted py-3" style="background:white;">Belum ada jadwal</td></tr>';
      } else {
        d.forEach(function(r, i) {
          var rn = i + 2;
          var hari = (r[0]||'').toString();
          var petugas = (r[1]||'').toString();
          var aksiHtml = '';
          if (isAdmin) {
            aksiHtml = '<div style="display:flex;flex-direction:column;gap:1.5vw;">'
              + '<button class="btn-edit-sm" onclick="bukaEditRonda(\'' + escStr(hari) + '\',\'' + escStr(petugas) + '\')">✏️</button>'
              + '<button class="btn-del-sm" onclick="hapusData(\'JadwalRonda\',' + rn + ',refreshRonda)">🗑️</button>'
              + '</div>';
          }
          h += '<tr>'
            + '<td style="font-size:4vw;font-weight:600;">' + hari + '</td>'
            + '<td style="font-size:4vw;">' + petugas + '</td>'
            + '<td style="background:white;">' + aksiHtml + '</td>'
            + '</tr>';
        });
      }
      document.getElementById('listRonda').innerHTML = h;
    }).fetchRonda();
  }

  function refreshInfo() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('listInfo');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada info RT</div>'; return; }
      var h = '';
      var items = d.map(function(r,i){ return {data:r, rowNum:i+2}; });
      items.reverse().forEach(function(item) {
        var r = item.data; var rn = item.rowNum;
        h += '<div class="card-custom"><div class="item-row"><div class="item-info" style="font-weight:600;font-size:3.5vw;">' + (r[1]||'') + '</div>'
          + (isAdmin ? '<div class="item-actions"><button class="btn-del-sm" onclick="hapusData(\'InfoRT\',' + rn + ',refreshInfo)">🗑️</button></div>' : '')
          + '</div>';
        if (r[2] && r[2].toString().startsWith('data:')) {
          h += '<img src="' + r[2] + '" style="width:100%;border-radius:10px;margin-top:8px;" onerror="this.style.display=\'none\'">';
        }
        h += '<div style="font-size:3vw;color:#aaa;margin-top:2vw;">' + (r[0]||'') + '</div></div>';
      });
      el.innerHTML = h;
    }).fetchData('InfoRT');
  }

  function refreshChat() {
    google.script.run.withSuccessHandler(function(d) {
      var el = document.getElementById('chatMessages');
      if (!d || d.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada pesan. Mulai diskusi!</div>'; return; }
      var h = '';
      d.forEach(function(r) {
        var mine = (r[1]||'').toString() === user.nama;
        h += '<div class="chat-bubble-wrap ' + (mine?'mine':'other') + '">'
          + '<div>';
        if (!mine) h += '<div class="chat-sender">' + (r[1]||'') + (r[2]?' (No. '+r[2]+')':'') + '</div>';
        h += '<div class="chat-bubble">' + (r[3]||'') + '<div class="chat-meta">' + (r[0]||'') + '</div></div>'
          + '</div></div>';
      });
      el.innerHTML = h;
      el.scrollTop = el.scrollHeight;
    }).fetchData('Chat');
  }

  // ============================================================
  // SIMPAN DATA
  // ============================================================
  function simpanPengumuman() {
    var isi = document.getElementById('inputPengumuman').value.trim();
    if (!isi) { alert("Tulis pengumuman dulu!"); return; }
    var tgl = new Date().toLocaleString('id-ID');
    if (editRow.Pengumuman > 0) {
      google.script.run.withSuccessHandler(function() {
        resetEditPengumuman(); refreshPengumuman();
      }).updateData('Pengumuman', editRow.Pengumuman, [tgl, isi, user.nama]);
    } else {
      google.script.run.withSuccessHandler(function() {
        document.getElementById('inputPengumuman').value = '';
        refreshPengumuman();
      }).withFailureHandler(function(e){ alert("Gagal: "+e.message); })
      .saveData('Pengumuman', [tgl, isi, user.nama]);
    }
  }

  function simpanLaporan() {
    var isi = document.getElementById('inputLaporan').value.trim();
    if (!isi) { alert("Tulis laporan dulu!"); return; }
    var tgl = new Date().toLocaleString('id-ID');
    google.script.run
      .withSuccessHandler(function() { document.getElementById('inputLaporan').value = ''; alert("Laporan terkirim!"); refreshLaporan(); })
      .withFailureHandler(function(e){ alert("Gagal: "+e.message); })
      .saveData('Laporan', [tgl, user.nama, user.peran, isi, 'Proses']);
  }

  function simpanTamu() {
    var nama = document.getElementById('inputTamuNama').value.trim();
    var keperluan = document.getElementById('inputTamuKeperluan').value.trim();
    if (!nama || !keperluan) { alert("Isi nama dan keperluan!"); return; }
    var tgl = new Date().toLocaleString('id-ID');
    if (editRow.Tamu > 0) {
      google.script.run.withSuccessHandler(function() {
        batalEdit('Tamu'); refreshTamu();
      }).updateData('BukuTamu', editRow.Tamu, [tgl, tgl, nama, user.nama, keperluan]);
    } else {
      google.script.run.withSuccessHandler(function() {
        document.getElementById('inputTamuNama').value = '';
        document.getElementById('inputTamuKeperluan').value = '';
        alert("Tamu berhasil dicatat!"); refreshTamu();
      }).saveData('BukuTamu', [tgl, tgl, nama, user.nama, keperluan]);
    }
  }

  function simpanKas() {
    var jenis = document.getElementById('inputKasJenis').value;
    var nominal = document.getElementById('inputKasNominal').value;
    var ket = document.getElementById('inputKasKet').value.trim();
    if (!nominal || !ket) { alert("Isi nominal dan keterangan!"); return; }
    google.script.run.withSuccessHandler(function() {
      document.getElementById('inputKasNominal').value = '';
      document.getElementById('inputKasKet').value = '';
      alert("Kas tersimpan!"); refreshKas();
    }).saveKas(jenis, nominal, ket);
  }

  function simpanWarga() {
    var nama = document.getElementById('inputWargaNama').value.trim();
    var rumah = document.getElementById('inputWargaRumah').value.trim();
    var hp = document.getElementById('inputWargaHP').value.trim();
    var status = document.getElementById('inputWargaStatus').value;
    if (!nama || !rumah) { alert("Isi nama dan no rumah!"); return; }
    if (editRow.Warga > 0) {
      google.script.run.withSuccessHandler(function() {
        batalEdit('Warga'); refreshWarga();
      }).updateData('DataWarga', editRow.Warga, [nama, rumah, hp, status]);
    } else {
      google.script.run.withSuccessHandler(function() {
        document.getElementById('inputWargaNama').value = '';
        document.getElementById('inputWargaRumah').value = '';
        document.getElementById('inputWargaHP').value = '';
        alert("Tersimpan!"); refreshWarga();
      }).saveData('DataWarga', [nama, rumah, hp, status]);
    }
  }

  function simpanKontrakan() {
    var no = document.getElementById('inputKontrakanNo').value.trim();
    var status = document.getElementById('inputKontrakanStatus').value;
    if (!no) { alert("Isi no rumah!"); return; }
    google.script.run.withSuccessHandler(function() {
      document.getElementById('inputKontrakanNo').value = '';
      alert("Terupdate!"); refreshKontrakan();
    }).updateKontrakan(no, status);
  }

  function simpanUMKM() {
    var nama = document.getElementById('inputUMKMNama').value.trim();
    var pemilik = document.getElementById('inputUMKMPemilik').value.trim();
    var rumah = document.getElementById('inputUMKMRumah').value.trim();
    var ket = document.getElementById('inputUMKMKet').value.trim();
    if (!nama || !pemilik) { alert("Isi nama dan pemilik!"); return; }
    if (editRow.UMKM > 0) {
      google.script.run.withSuccessHandler(function() {
        batalEdit('UMKM'); refreshUMKM();
      }).updateData('UMKM', editRow.UMKM, [nama, pemilik, rumah, ket]);
    } else {
      google.script.run.withSuccessHandler(function() {
        document.getElementById('inputUMKMNama').value = '';
        document.getElementById('inputUMKMPemilik').value = '';
        document.getElementById('inputUMKMRumah').value = '';
        document.getElementById('inputUMKMKet').value = '';
        alert("Tersimpan!"); refreshUMKM();
      }).saveData('UMKM', [nama, pemilik, rumah, ket]);
    }
  }

  function simpanYatim() {
    var nama = document.getElementById('inputYatimNama').value.trim();
    var umur = document.getElementById('inputYatimUmur').value.trim();
    var rumah = document.getElementById('inputYatimRumah').value.trim();
    if (!nama) { alert("Isi nama!"); return; }
    if (editRow.Yatim > 0) {
      google.script.run.withSuccessHandler(function() {
        batalEdit('Yatim'); refreshYatim();
      }).updateData('DataYatim', editRow.Yatim, [nama, umur, rumah]);
    } else {
      google.script.run.withSuccessHandler(function() {
        document.getElementById('inputYatimNama').value = '';
        document.getElementById('inputYatimUmur').value = '';
        document.getElementById('inputYatimRumah').value = '';
        alert("Tersimpan!"); refreshYatim();
      }).saveData('DataYatim', [nama, umur, rumah]);
    }
  }

        alert("Berhasil diupload!"); refreshInfo();

    reader.readAsDataURL(fileInput.files[0]);

    var pesanMap = {

    pesan += '\n🕐 Waktu: ' + waktu;
    pesan += '\n📍 Lokasi: ' + noRumah + ', RT 05';
    window.open('https://wa.me/' + NOMOR_WA_KETUA + '?text=' + encodeURIComponent(pesan), '_blank');

  }

  // PENGATURAN FONT & TEMA
  // ============================================================
  function ubahFont(ukuran) {
    document.body.classList.remove('font-kecil','font-normal','font-besar');
    document.body.classList.add('font-' + ukuran);
    // Update button states
    document.querySelectorAll('[data-font]').forEach(function(b) {
      b.style.background = b.getAttribute('data-font') === ukuran ? 'var(--primary)' : '#f5f5f5';
      b.style.color = b.getAttribute('data-font') === ukuran ? 'white' : '#333';
      b.style.borderColor = b.getAttribute('data-font') === ukuran ? 'var(--primary)' : '#ddd';
    });
    localStorage.setItem('rt05_font', ukuran);
  }

  function ubahTema(tema) {
    if (tema === 'dark') {
      document.body.classList.add('dark-mode');
    } else {
      document.body.classList.remove('dark-mode');
    }
    // Update theme button states
    document.querySelectorAll('[data-tema]').forEach(function(b) {
      b.style.background = b.getAttribute('data-tema') === tema ? 'var(--primary)' : (tema === 'dark' ? '#2a2a3e' : 'white');
      b.style.color = b.getAttribute('data-tema') === tema ? 'white' : (tema === 'dark' ? '#aaa' : '#555');
    });
    localStorage.setItem('rt05_tema', tema);
  }
  function terapkanPengaturan() {
    var font = localStorage.getItem('rt05_font') || 'normal';
    var tema = localStorage.getItem('rt05_tema') || 'light';
    ubahFont(font);
    ubahTema(tema);
  }

  function buka(id, navId) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    if (navId) {
      document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById(navId).classList.add('active');
    }
    window.scrollTo(0, 0);
  }

  function toggleEl(id) {
    var el = document.getElementById(id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }
